<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Mini Project</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="container">
    <header>
      <h1>DevOps Mini Project 🚀</h1>
      <p>Static app served using Docker + Python HTTP Server</p>
    </header>

    <section class="card">
      <h2>System Status</h2>
      <p id="status">Checking server...</p>
      <button onclick="checkStatus()">Check Again</button>
    </section>

    <section class="card">
      <h2>About</h2>
      <p>
        This project demonstrates containerization using Docker and serving
        a static frontend without any framework.
      </p>
    </section>

    <footer>
      <p>Built for DevOps Mini Project • Simple but clean</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
